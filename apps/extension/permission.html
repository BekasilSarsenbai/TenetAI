<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tenet · доступ к микрофону</title>
<style>
  :root{--bg:#0E0E10;--t1:rgba(255,255,255,.96);--t2:rgba(255,255,255,.62);--t3:rgba(255,255,255,.42);
    --ok:#34C759;--amber:#FFB454;--hair:rgba(255,255,255,.1)}
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif}
  body{min-height:100vh;background:radial-gradient(120% 90% at 50% -10%,#1a1a1f,#0b0b0d);color:var(--t1);
    display:grid;place-items:center;padding:24px;-webkit-font-smoothing:antialiased}
  .card{width:420px;max-width:92vw;text-align:center}
  .brand{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:26px}
  .brand svg{width:22px;height:22px}
  .brand b{font-size:13px;font-weight:800;letter-spacing:.15em}
  .mic{width:66px;height:66px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid var(--hair);
    display:grid;place-items:center;margin:0 auto 20px;color:var(--amber);transition:.2s}
  .mic svg{width:28px;height:28px}
  h1{font-size:21px;font-weight:800;margin-bottom:9px}
  p{font-size:14px;color:var(--t2);line-height:1.55;margin-bottom:24px}
  p b{color:var(--t1)}
  button{width:100%;height:50px;border:0;border-radius:13px;background:#fff;color:#0E0E10;
    font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s}
  button:hover{transform:translateY(-1px);box-shadow:0 10px 26px -8px rgba(255,255,255,.28)}
  button:disabled{opacity:.6;cursor:default;transform:none;box-shadow:none}
  .status{margin-top:15px;font-size:13px;color:var(--t3);min-height:18px;line-height:1.5}
  [data-state="ok"] .mic{color:var(--ok);border-color:rgba(52,199,89,.4);background:rgba(52,199,89,.08)}
  [data-state="ok"] .status{color:var(--ok)}
  [data-state="denied"] .status{color:#ff8f8f}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">

      <b>TENET</b>
    </div>
    <div class="mic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a3 3 0 013 3v5a3 3 0 01-6 0V6a3 3 0 013-3z"/><path d="M5 11a7 7 0 0014 0M12 18v3"/></svg></div>
    <h1>Разреши доступ к микрофону</h1>
    <p>Чтобы Tenet записал <b>твой голос</b> в звонке — а не только собеседников. Разрешить нужно <b>один раз</b>, дальше запомнится.</p>
    <button id="grant">Разрешить микрофон</button>
    <div class="status" id="status"></div>
  </div>
  <script src="permission.js"></script>

</html>
